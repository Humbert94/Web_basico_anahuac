<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Ejercicio 7, flexbox</title>
    <style>
    html{
        box-sizing: border-box;
    }
    *, *:before, *:after {
        box-sizing: inherit;
    }

    body{
        color: aliceblue;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }
    p{
        padding: 1em;
    }
    #container1{
        width: 600px;
        height: 600px;
        background-color: slategrey;        
        display: flex;
        flex-wrap: wrap;
        justify-content:space-evenly;
        align-items: flex-end;        
    }
    .caja{
        width: auto;
        height: 100px;
    }
    .box1{
        background-color: #B2791E;
        height: 120px;
    }
    .box2{
        background-color: #FFA619;
        height: 200px;
    }
    .box3{
        background-color: #FF9C00;
        height: 250px;;
    }
    .box4{
        background-color: #005FB2;
        height: 300px;
    }
    .box5{
        background-color: #0088FF;
        height: 350px;
    }
    #container2{
        width: 100wv;
        height: 600px;
        background-color: black;        
        display: flex;
        flex-wrap: wrap;
              
    }
    .caja-a{
        flex-grow: 1;
    }
    .box6{
        background-color: #B20082;        
    }
    .box7{
        background-color: #FF19C0;        
    }
    .box8{
        background-color: #FF00B9;        
    }
    .box9{
        background-color: #1CB200;       
    }
    .box10{
        background-color: #A2FF91;
    }
    </style>

</head>
<body>
    <div id="container1">
        <section class="box1 caja"><p>Caja 1</p></section>
        <section class="box2 caja"><p>Caja 2</p></section>
        <section class="box3 caja"><p>Caja 3</p></section>
        <section class="box4 caja"><p>Caja 4</p></section>
        <section class="box5 caja"><p>Caja 5</p></section>
    </div>
    <div id="container2">
        <section class="box6 caja-a"><p>Caja 6</p></section>
        <section class="box7 caja-a"><p>Caja 7 mas texto</p></section>
        <section class="box8 caja-a"><p>Caja 8 mas texto aqui para</p></section>
        <section class="box9 caja-a"><p>Caja 9</p></section>
        <section class="box10 caja-a"><p>Caja 10</p></section>
    </div>
    
</body>
</html>
